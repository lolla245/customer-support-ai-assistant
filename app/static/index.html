<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Support AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d27;
      padding: 16px 24px;
      border-bottom: 1px solid #2a2d3e;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    header span {
      font-size: 12px;
      color: #6b7280;
      margin-left: 4px;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 800px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.bot .avatar { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .message.user .avatar { background: #2a2d3e; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 680px;
    }

    .message.bot .bubble {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-top-left-radius: 4px;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border-top-right-radius: 4px;
    }

    .sources {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .category-tag {
      font-size: 11px;
      background: #1e3a5f;
      color: #60a5fa;
      padding: 2px 10px;
      border-radius: 20px;
      border: 1px solid #2563eb;
      display: inline-block;
      margin-bottom: 8px;
    }

    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 12px 16px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #6366f1;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    .input-area {
      padding: 16px 24px;
      background: #1a1d27;
      border-top: 1px solid #2a2d3e;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    .input-area input:focus { border-color: #6366f1; }
    .input-area input::placeholder { color: #4b5563; }

    .input-area button {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 12px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }

    .input-area button:hover { opacity: 0.85; }
    .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

    .welcome {
      text-align: center;
      margin: auto;
      padding: 40px;
    }

    .welcome h2 { font-size: 24px; color: #fff; margin-bottom: 8px; }
    .welcome p { color: #6b7280; font-size: 14px; margin-bottom: 24px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestion {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: #a0aec0;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion:hover {
      border-color: #6366f1;
      color: #6366f1;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div>
    <h1>Support Assistant <span>powered by RAG + Groq</span></h1>
  </div>
</header>

<div class="chat-container" id="chat">
  <div class="welcome" id="welcome">
    <h2>👋 Hi! How can I help you?</h2>
    <p>Ask me anything about your account, orders, or policies.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="sendSuggestion(this)">How do I reset my password?</div>
      <div class="suggestion" onclick="sendSuggestion(this)">What is your refund policy?</div>
      <div class="suggestion" onclick="sendSuggestion(this)">How do I track my order?</div>
      <div class="suggestion" onclick="sendSuggestion(this)">How do I delete my account?</div>
      <div class="suggestion" onclick="sendSuggestion(this)">I can't log in to my account</div>
    </div>
  </div>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="Type your question..." onkeydown="if(event.key==='Enter') sendMessage()" />
  <button onclick="sendMessage()" id="sendBtn">➤</button>
</div>

<script>
  async function sendMessage() {
    const input = document.getElementById('userInput');
    const question = input.value.trim();
    if (!question) return;
    input.value = '';
    submitQuestion(question);
  }

  function sendSuggestion(el) {
    submitQuestion(el.textContent);
  }

  async function submitQuestion(question) {
    // Hide welcome
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const chat = document.getElementById('chat');
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;

    // User message
    chat.innerHTML += `
      <div class="message user">
        <div class="avatar">👤</div>
        <div class="bubble">${question}</div>
      </div>`;

    // Typing indicator
    const typingId = 'typing-' + Date.now();
    chat.innerHTML += `
      <div class="message bot" id="${typingId}">
        <div class="avatar">🤖</div>
        <div class="bubble">
          <div class="typing"><span></span><span></span><span></span></div>
        </div>
      </div>`;
    chat.scrollTop = chat.scrollHeight;

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });
      const data = await res.json();

      document.getElementById(typingId).remove();

      const sourceTags = data.sources.map(s =>
        `<span class="source-tag">📄 ${s.replace('.txt','')}</span>`
      ).join('');

      chat.innerHTML += `
        <div class="message bot">
          <div class="avatar">🤖</div>
          <div class="bubble">
            <div class="category-tag">🏷️ ${data.category}</div>
            ${data.answer}
            <div class="sources">${sourceTags}</div>
          </div>
        </div>`;
    } catch(e) {
      document.getElementById(typingId).remove();
      chat.innerHTML += `
        <div class="message bot">
          <div class="avatar">🤖</div>
          <div class="bubble">❌ Something went wrong. Please try again.</div>
        </div>`;
    }

    chat.scrollTop = chat.scrollHeight;
    btn.disabled = false;
  }
</script>
</body>
</html>
