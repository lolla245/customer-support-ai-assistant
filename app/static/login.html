<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login — Support Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0B0E1A;
      color: #EDEDF4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #12162A;
      border: 1px solid #232a4a;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 360px;
    }
    h1 { font-size: 20px; margin-bottom: 4px; }
    p.subtitle { font-size: 13px; color: #8B8FA3; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #8B8FA3; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 12px;
      background: #171c34;
      border: 1px solid #232a4a;
      border-radius: 8px;
      color: #EDEDF4;
      margin-bottom: 16px;
      font-size: 14px;
    }
    button {
      width: 100%;
      background: linear-gradient(135deg, #7C3AED, #C026D3);
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 11px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    button:hover { opacity: 0.9; }
    .toggle { text-align: center; margin-top: 16px; font-size: 13px; color: #8B8FA3; }
    .toggle span { color: #C026D3; cursor: pointer; text-decoration: underline; }
    .error { color: #f87171; font-size: 13px; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="formTitle">Welcome back</h1>
    <p class="subtitle" id="formSubtitle">Log in to continue to Support Assistant</p>

    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" />

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" />

    <button onclick="submitForm()" id="submitBtn">Log In</button>

    <div class="toggle" id="toggleText">
      Don't have an account? <span onclick="toggleMode()">Sign up</span>
    </div>

    <div class="error" id="errorMsg"></div>
  </div>

  <script>
    let isLogin = true;

    function toggleMode() {
      isLogin = !isLogin;
      document.getElementById('formTitle').textContent = isLogin ? 'Welcome back' : 'Create an account';
      document.getElementById('formSubtitle').textContent = isLogin ? 'Log in to continue to Support Assistant' : 'Sign up to get started';
      document.getElementById('submitBtn').textContent = isLogin ? 'Log In' : 'Sign Up';
      document.getElementById('toggleText').innerHTML = isLogin
        ? `Don't have an account? <span onclick="toggleMode()">Sign up</span>`
        : `Already have an account? <span onclick="toggleMode()">Log in</span>`;
      document.getElementById('errorMsg').textContent = '';
    }

    async function submitForm() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = '';

      if (!username || !password) {
        errorMsg.textContent = 'Please fill in all fields';
        return;
      }

      const endpoint = isLogin ? '/auth/login' : '/auth/signup';

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.detail || 'Something went wrong';
          return;
        }

        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('username', username);
        window.location.href = '/';
      } catch (e) {
        errorMsg.textContent = 'Network error. Please try again.';
      }
    }
  </script>
</body>
</html>
